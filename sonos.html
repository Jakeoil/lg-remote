<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <title>Sonos</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.ico">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="sonos.css">
</head>
<body>
  <div class="container">

    <!-- Title bar -->
    <div class="title-bar">
      <h1 class="title">Sonos</h1>
    </div>

    <!-- Device status -->
    <div class="device-status">
      <div class="device-indicator device-btn" id="plug-indicator" onclick="togglePlug()">
        <span id="plug-dot" class="dot dot-unknown"></span>
        <span class="device-label">Plug</span>
        <span id="plug-state" class="device-state">--</span>
      </div>
      <div class="device-indicator">
        <span id="sonos-dot" class="dot dot-unknown"></span>
        <span class="device-label">Sonos</span>
        <span id="sonos-state" class="device-state">--</span>
      </div>
    </div>

    <!-- Volume -->
    <div class="ruler-bar">
      <span class="volume-label"><svg class="brand-icon" role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12.988 12.36l-2.813-2.634v4.429h.837V11.7l2.813 2.633V9.905h-.837zM6.464 9.665A2.3 2.3 0 0 0 4.13 12c0 1.257 1.077 2.334 2.334 2.334A2.3 2.3 0 0 0 8.798 12a2.3 2.3 0 0 0-2.334-2.334m0 3.83A1.482 1.482 0 0 1 4.968 12c0-.838.658-1.496 1.496-1.496S7.96 11.162 7.96 12s-.658 1.496-1.496 1.496M2.694 12c-.24-.18-.54-.3-.958-.419-.838-.24-.838-.479-.838-.598 0-.24.299-.48.718-.48.36 0 .658.18.778.24l.06.06.658-.479-.06-.06s-.538-.598-1.436-.598c-.419 0-.838.12-1.137.359-.3.24-.479.598-.479.958s.18.718.479.957c.24.18.538.3.957.42.838.239.838.478.838.598 0 .239-.299.478-.718.478-.359 0-.658-.18-.778-.239l-.06-.06-.658.479.06.06s.538.598 1.436.598c.42 0 .838-.12 1.137-.359.3-.24.48-.598.48-.957 0-.36-.18-.659-.48-.958m14.843-2.334A2.3 2.3 0 0 0 15.202 12a2.337 2.337 0 0 0 2.334 2.334A2.3 2.3 0 0 0 19.87 12a2.337 2.337 0 0 0-2.334-2.334m0 3.83A1.482 1.482 0 0 1 16.04 12c0-.838.658-1.496 1.496-1.496s1.496.658 1.496 1.496-.718 1.496-1.496 1.496m3.77-1.556c.24.18.54.3.958.42.838.239.838.478.838.598 0 .239-.299.478-.718.478-.36 0-.658-.18-.778-.239h-.06l-.658.479.06.06s.538.598 1.436.598c.419 0 .838-.12 1.137-.359s.479-.598.479-.958-.18-.718-.479-.957c-.24-.18-.538-.3-.957-.42-.838-.239-.838-.478-.838-.598 0-.239.299-.478.718-.478.359 0 .658.18.778.239l.06.06.658-.479-.06-.06s-.538-.598-1.436-.598c-.42 0-.838.12-1.137.359-.3.24-.48.598-.48.957-.059.36.12.659.48.898"/></svg></span>
      <button id="mute-btn" class="btn-mute-icon" onclick="toggleMute()">🔊</button>
      <canvas id="volume-ruler" class="ruler-canvas"></canvas>
    </div>

    <!-- EQ -->
    <div class="section-title">Equalizer</div>
    <div class="eq-row">
      <span class="eq-label">Bass</span>
      <canvas id="bass-ruler" class="eq-canvas"></canvas>
    </div>
    <div class="eq-row">
      <span class="eq-label">Treble</span>
      <canvas id="treble-ruler" class="eq-canvas"></canvas>
    </div>
    <div class="eq-row">
      <span class="eq-label">Height</span>
      <canvas id="height-ruler" class="eq-canvas"></canvas>
    </div>
    <div class="eq-row">
      <span class="eq-label">Sub</span>
      <canvas id="sub-ruler" class="eq-canvas"></canvas>
    </div>

    <!-- Speech Enhancement -->
    <div class="section-title">Speech Enhancement</div>
    <div class="eq-row">
      <span class="eq-label">Speech</span>
      <canvas id="speech-ruler" class="eq-canvas"></canvas>
    </div>

    <!-- Toggles -->
    <div class="section-title">Settings</div>
    <div class="toggle-grid">
      <button class="toggle-btn" id="toggle-night" onclick="toggleEQ('NightMode')">Night Mode</button>
      <button class="toggle-btn" id="toggle-loudness" onclick="toggleLoudness()">Loudness</button>
      <button class="toggle-btn" id="toggle-surround" onclick="toggleEQ('SurroundEnable')">Surround</button>
      <button class="toggle-btn" id="toggle-surround-mode" onclick="toggleEQ('SurroundMode')">Surround Full</button>
    </div>

    <!-- Transport -->
    <div class="section-title">Transport</div>
    <div class="transport-row">
      <button class="transport-btn" onclick="transport('play')">&#9654; Play</button>
      <button class="transport-btn" onclick="transport('pause')">&#9646;&#9646; Pause</button>
      <button class="transport-btn" onclick="transport('stop')">&#9632; Stop</button>
    </div>

    <button class="now-playing-btn" onclick="showNowPlaying()">Now Playing</button>

  </div>

  <!-- Now Playing popup -->
  <div id="np-overlay" class="np-overlay hidden" onclick="hideNowPlaying()">
    <div class="np-popup" onclick="event.stopPropagation()">
      <div id="np-art-wrap" class="np-art-wrap">
        <img id="np-art" class="np-art" alt="">
      </div>
      <div id="np-title" class="np-title"></div>
      <div id="np-artist" class="np-artist"></div>
      <div id="np-album" class="np-album"></div>
      <div class="np-time-row">
        <span id="np-pos"></span>
        <span id="np-dur"></span>
      </div>
      <button class="np-close" onclick="hideNowPlaying()">Close</button>
    </div>
  </div>
  <script src="sliding-ruler.js"></script>
  <script src="sonos-app.js"></script>
  <script src="nav.js"></script>
</body>
</html>
